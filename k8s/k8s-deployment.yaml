apiVersion: apps/v1
kind: Deployment
metadata:
  name: lark-context
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lark-context
  template:
    metadata:
      labels:
        app: lark-context
    spec:
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: lark-context-data
        - name: pi-config-volume
          persistentVolumeClaim:
            claimName: pi-config
      containers:
        - name: bot
          image: lark-context:latest
          ports:
            - containerPort: 3000
          env:
            - name: LARK_APP_ID
              valueFrom:
                secretKeyRef:
                  name: lark-context-secret
                  key: LARK_APP_ID
            - name: LARK_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: lark-context-secret
                  key: LARK_APP_SECRET
            - name: DATA_PATH
              value: /app/data
          volumeMounts:
            - name: data-volume
              mountPath: /app/data
            - name: pi-config-volume
              mountPath: /root/.pi/agent
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lark-context-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pi-config
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
